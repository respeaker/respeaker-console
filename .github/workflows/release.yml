name: "publish"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macos-arm64"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles app"
          - name: "macos-x64"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin --bundles app"
          - name: "linux-x64"
            platform: "ubuntu-22.04"
            args: "--bundles appimage,deb"
          - name: "windows-x64"
            platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          ENDPOINT="https://github.com/${REPO}/releases/latest/download/latest.json"
          PUBKEY="${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"

          # Replace placeholders in tauri.conf.json
          sed -i.bak "s|__TAURI_UPDATER_ENDPOINT__|${ENDPOINT}|g" src-tauri/tauri.conf.json
          sed -i.bak "s|__TAURI_UPDATER_PUBKEY__|${PUBKEY}|g" src-tauri/tauri.conf.json

          echo "Updater configured with endpoint: ${ENDPOINT}"

      - name: Build the project
        uses: tauri-apps/tauri-action@v0
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "ReSpeaker Console v__VERSION__"
          releaseBody: "Desktop release bundles for Windows, macOS, and Linux. Download the asset that matches your platform."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
