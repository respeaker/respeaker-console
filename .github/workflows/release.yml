name: "publish"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macos-arm64"
            os: "macos"
            arch: "arm64"
            platform: "macos-latest"
            target: "aarch64-apple-darwin"
            bundles: "app,dmg"
          - name: "macos-x64"
            os: "macos"
            arch: "x64"
            platform: "macos-latest"
            target: "x86_64-apple-darwin"
            bundles: "app,dmg"
          - name: "linux-x64"
            os: "linux"
            arch: "x64"
            platform: "ubuntu-22.04"
            bundles: "appimage,deb,rpm"
          - name: "linux-arm64"
            os: "linux"
            arch: "arm64"
            platform: "ubuntu-22.04-arm"
            bundles: "appimage,deb,rpm"
          - name: "windows-x64"
            os: "windows"
            arch: "x64"
            platform: "windows-latest"
            bundles: "nsis,msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            xdg-utils \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Export app version
        shell: bash
        run: echo "APP_VERSION=$(node -p 'require(\"./src-tauri/tauri.conf.json\").version')" >> "$GITHUB_ENV"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          ENDPOINT="https://github.com/${REPO}/releases/latest/download/latest.json"
          PUBKEY="${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"

          # Replace placeholders in tauri.conf.json
          sed -i.bak "s|__TAURI_UPDATER_ENDPOINT__|${ENDPOINT}|g" src-tauri/tauri.conf.json
          sed -i.bak "s|__TAURI_UPDATER_PUBKEY__|${PUBKEY}|g" src-tauri/tauri.conf.json

          echo "Updater configured with endpoint: ${ENDPOINT}"

      - name: Validate signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret. Set it to the full private key content, not the key file path."
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PUBLIC_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PUBLIC_KEY secret. Set it to the generated public key string."
            exit 1
          fi

          echo "Signing secrets detected."
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "Signing key password is empty."
          else
            echo "Signing key password detected."
          fi

      - name: Build the project
        uses: tauri-apps/tauri-action@v0
        id: tauri-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "ReSpeaker Console v__VERSION__"
          releaseBody: |
            ReSpeaker Console v__VERSION__

            Cross-platform desktop release for ReSpeaker XVF3800 device management.

            Included assets:
            - Windows: NSIS installer, MSI installer, and portable ZIP
            - macOS: `.app` bundle, `.dmg` installer, updater archive, and portable ZIP
            - Linux: AppImage, DEB, RPM, and portable ZIP

            Notes:
            - Download the asset that matches your operating system and architecture.
            - Auto-update artifacts and signature files are included for supported platforms.
            - See the repository documentation for device support, setup requirements, and update behavior.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target && format('--target {0} --bundles {1}', matrix.target, matrix.bundles) || format('--bundles {0}', matrix.bundles) }}

      - name: Create portable archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "src-tauri/target/release/bundle/portable"

          if [ "${{ matrix.os }}" = "macos" ]; then
            APP_DIR=$(find \
              "src-tauri/target/${{ matrix.target }}/release/bundle/macos" \
              -maxdepth 1 \
              -type d \
              -name "*.app" \
              | head -1)
            if [ -z "${APP_DIR}" ]; then
              echo "::error::No macOS app bundle found under src-tauri/target/${{ matrix.target }}/release/bundle/macos"
              find "src-tauri/target/${{ matrix.target }}/release/bundle" -maxdepth 3 -print || true
              exit 1
            fi
            ARCHIVE="src-tauri/target/release/bundle/portable/ReSpeaker-Console_v${APP_VERSION}_macos-${{ matrix.arch }}_portable.zip"
            ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "${ARCHIVE}"
          else
            BIN_PATH="src-tauri/target/release/respeaker-console"
            STAGE_DIR="$(mktemp -d)"
            cp "${BIN_PATH}" "${STAGE_DIR}/respeaker-console"
            chmod +x "${STAGE_DIR}/respeaker-console"
            ARCHIVE="src-tauri/target/release/bundle/portable/ReSpeaker-Console_v${APP_VERSION}_linux-${{ matrix.arch }}_portable.zip"
            (
              cd "${STAGE_DIR}"
              zip -r "${GITHUB_WORKSPACE}/${ARCHIVE}" .
            )
          fi

      - name: Create portable archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/target/release/bundle/portable" | Out-Null
          Compress-Archive `
            -Path "src-tauri/target/release/respeaker-console.exe" `
            -DestinationPath "src-tauri/target/release/bundle/portable/ReSpeaker-Console_v${env:APP_VERSION}_windows-${{ matrix.arch }}_portable.zip" `
            -Force

      - name: Upload portable archive to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/portable/*.zip
          append_body: false
          fail_on_unmatched_files: true
