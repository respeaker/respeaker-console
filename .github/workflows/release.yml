name: "publish"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts but do not publish GitHub Release"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-release-assets:
    name: >-
      build-release-assets (${{ matrix.name }}, ${{ matrix.os }}, ${{ matrix.arch }},
      ${{ matrix.platform }}, ${{ matrix.bundles }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macos-universal"
            os: "macos"
            arch: "universal"
            platform: "macos-14"
            bundles: "app,dmg"
          - name: "linux-x64"
            os: "linux"
            arch: "x86_64"
            platform: "ubuntu-22.04"
            bundles: "appimage,deb,rpm"
          - name: "linux-arm64"
            os: "linux"
            arch: "arm64"
            platform: "ubuntu-22.04-arm"
            bundles: "appimage,deb,rpm"
          - name: "windows-x64"
            os: "windows"
            arch: "x64"
            platform: "windows-2022"
            bundles: "msi"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.os == 'macos'
        shell: bash
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Export app version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "TAG_VERSION=ci-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          else
            echo "TAG_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            xdg-utils \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          ENDPOINT="https://github.com/${REPO}/releases/latest/download/latest.json"
          PUBKEY="${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"

          sed -i.bak "s|__TAURI_UPDATER_ENDPOINT__|${ENDPOINT}|g" src-tauri/tauri.conf.json
          sed -i.bak "s|__TAURI_UPDATER_PUBKEY__|${PUBKEY}|g" src-tauri/tauri.conf.json

      - name: Validate signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret. Set it to the full private key content."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PUBLIC_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PUBLIC_KEY secret. Set it to the generated public key string."
            exit 1
          fi

      - name: Validate macOS signing and notarization secrets
        if: matrix.os == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE}" ]; then
            echo "::error::Missing APPLE_CERTIFICATE secret. Set it to the base64-encoded .p12 certificate."
            exit 1
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD}" ]; then
            echo "::error::Missing APPLE_CERTIFICATE_PASSWORD secret. Set it to the exported .p12 password."
            exit 1
          fi
          if [ -z "${APPLE_ID}" ]; then
            echo "::error::Missing APPLE_ID secret. Set it to the Apple Developer account email."
            exit 1
          fi
          if [ -z "${APPLE_PASSWORD}" ]; then
            echo "::error::Missing APPLE_PASSWORD secret. Use an Apple app-specific password."
            exit 1
          fi
          if [ -z "${APPLE_TEAM_ID}" ]; then
            echo "::error::Missing APPLE_TEAM_ID secret. Set it to the Apple Developer Team ID."
            exit 1
          fi
          if [ -z "${KEYCHAIN_PASSWORD}" ]; then
            echo "::error::Missing KEYCHAIN_PASSWORD secret. Set it to a random temporary keychain password."
            exit 1
          fi

      - name: Build Tauri App (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build Tauri App (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: pnpm tauri build --bundles msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri App (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: pnpm tauri build --bundles appimage,deb,rpm
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare macOS assets
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets

          DMG=$(find "src-tauri/target/universal-apple-darwin/release/bundle" -name "*.dmg" | head -1)
          TAR_GZ=$(find "src-tauri/target/universal-apple-darwin/release/bundle" -name "*.app.tar.gz" | head -1)
          APP_DIR=$(find "src-tauri/target/universal-apple-darwin/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -1)

          cp "${DMG}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-macOS.dmg"
          cp "${TAR_GZ}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-macOS.tar.gz"
          cp "${TAR_GZ}.sig" "release-assets/ReSpeaker-Console-${TAG_VERSION}-macOS.tar.gz.sig"
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-macOS.zip"

      - name: Prepare Windows assets
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null

          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.msi" | Select-Object -First 1
          if ($null -eq $msi) {
            throw "No MSI bundle found"
          }

          Copy-Item $msi.FullName "release-assets/ReSpeaker-Console-$env:TAG_VERSION-Windows.msi"
          if (Test-Path "$($msi.FullName).sig") {
            Copy-Item "$($msi.FullName).sig" "release-assets/ReSpeaker-Console-$env:TAG_VERSION-Windows.msi.sig"
          }

          $portableDir = "release-assets/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "src-tauri/target/release/respeaker-console.exe" "$portableDir/ReSpeaker-Console.exe"
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/ReSpeaker-Console-$env:TAG_VERSION-Windows-Portable.zip" -Force
          Remove-Item -Recurse -Force $portableDir

      - name: Prepare Linux assets
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets

          APPIMAGE=$(find "src-tauri/target/release/bundle" -name "*.AppImage" | head -1)
          DEB=$(find "src-tauri/target/release/bundle" -name "*.deb" | head -1)
          RPM=$(find "src-tauri/target/release/bundle" -name "*.rpm" | head -1)

          cp "${APPIMAGE}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-Linux-${{ matrix.arch }}.AppImage"
          cp "${APPIMAGE}.sig" "release-assets/ReSpeaker-Console-${TAG_VERSION}-Linux-${{ matrix.arch }}.AppImage.sig"
          cp "${DEB}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-Linux-${{ matrix.arch }}.deb"
          cp "${RPM}" "release-assets/ReSpeaker-Console-${TAG_VERSION}-Linux-${{ matrix.arch }}.rpm"

      - name: List prepared assets
        shell: bash
        run: ls -la release-assets

      - name: Upload release assets to workflow
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: "Publish GitHub Release"
    runs-on: ubuntu-22.04
    needs: build-release-assets
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) }}
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          MAC_URL="${BASE_URL}/ReSpeaker-Console-${TAG}-macOS.tar.gz"
          MAC_SIG=$(cat "release-assets/ReSpeaker-Console-${TAG}-macOS.tar.gz.sig")
          WIN_URL="${BASE_URL}/ReSpeaker-Console-${TAG}-Windows.msi"
          WIN_SIG=$(cat "release-assets/ReSpeaker-Console-${TAG}-Windows.msi.sig")
          LINUX_X64_URL="${BASE_URL}/ReSpeaker-Console-${TAG}-Linux-x86_64.AppImage"
          LINUX_X64_SIG=$(cat "release-assets/ReSpeaker-Console-${TAG}-Linux-x86_64.AppImage.sig")
          LINUX_ARM64_URL="${BASE_URL}/ReSpeaker-Console-${TAG}-Linux-arm64.AppImage"
          LINUX_ARM64_SIG=$(cat "release-assets/ReSpeaker-Console-${TAG}-Linux-arm64.AppImage.sig")

          cat > "release-assets/latest.json" <<EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_X64_SIG}",
                "url": "${LINUX_X64_URL}"
              },
              "linux-aarch64": {
                "signature": "${LINUX_ARM64_SIG}",
                "url": "${LINUX_ARM64_URL}"
              }
            }
          }
          EOF

      - name: List final release assets
        shell: bash
        run: ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ReSpeaker Console ${{ github.ref_name }}
          body: |
            ## ReSpeaker Console ${{ github.ref_name }}

            Desktop release for ReSpeaker XVF3800 device management.

            ### Downloads

            - **macOS**: `ReSpeaker-Console-${{ github.ref_name }}-macOS.dmg` or `ReSpeaker-Console-${{ github.ref_name }}-macOS.zip`
            - **Windows**: `ReSpeaker-Console-${{ github.ref_name }}-Windows.msi` or `ReSpeaker-Console-${{ github.ref_name }}-Windows-Portable.zip`
            - **Linux (x86_64)**: `ReSpeaker-Console-${{ github.ref_name }}-Linux-x86_64.AppImage` / `.deb` / `.rpm`
            - **Linux (ARM64)**: `ReSpeaker-Console-${{ github.ref_name }}-Linux-arm64.AppImage` / `.deb` / `.rpm`

            > `ReSpeaker-Console-${{ github.ref_name }}-macOS.tar.gz` and `latest.json` are updater assets for in-app updates.
          files: release-assets/*
